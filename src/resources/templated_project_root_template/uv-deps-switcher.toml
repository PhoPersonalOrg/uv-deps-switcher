# Configuration file for uv-deps-switcher
# Copy this to .uv-deps-switcher.toml in your workspace root or home directory

# Optional: default GitHub username for cloning missing deps with no git URL in release template (defaults to active repo origin)
# default_github_username = "CommanderPho"

[groups.main]
description = "Main development group"
repos = ["stream_viewer", "PhoLogToLabStreamingLayer", "whisper-timestamped"]

[groups.all]
description = "All repos with templating"
repos = ["stream_viewer", "PhoLogToLabStreamingLayer", "whisper-timestamped", "PhoPyLSLhelper"]
